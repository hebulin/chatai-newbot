<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="my_css/admin.css">
</head>
<body>
<div class="admin-layout">
    <!-- 顶部导航 -->
    <nav class="admin-nav">
        <div class="nav-brand">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
            <span>管理后台</span>
        </div>
        <div class="nav-actions">
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="切换主题">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
            <button class="nav-btn" onclick="window.location.href='/index.html'">
                <i class="layui-icon layui-icon-return"></i> 返回聊天
            </button>
        </div>
    </nav>

    <main class="admin-main">
        <div class="layui-tab layui-tab-brief admin-tab" lay-filter="adminTab">
            <ul class="layui-tab-title">
                <li class="layui-this">快速接入</li>
                <li>模型管理</li>
                <li>用户管理</li>
                <li>数据统计</li>
            </ul>
            <div class="layui-tab-content">
                <!-- 快速接入 -->
                <div class="layui-tab-item layui-show">
                <div class="section-header">
                    <h2>快速接入模型</h2>
                    <span class="section-tip">选择厂商，填入 API Key 即可一键接入所有模型</span>
                </div>
                <div class="provider-grid" id="providerGrid">
                    <!-- 动态生成厂商卡片 -->
                </div>
            </div>

            <!-- 模型管理 -->
            <div class="layui-tab-item">
                <div class="section-header">
                    <h2>模型管理</h2>
                    <button class="primary-btn" onclick="showAddModel()">
                        <i class="layui-icon layui-icon-addition"></i> 添加模型
                    </button>
                </div>
                <div class="card">
                    <table class="layui-table data-table" id="modelTable" lay-skin="nob">
                        <thead><tr><th>名称</th><th>厂商</th><th>模型</th><th>思考</th><th>状态</th><th>可见性</th><th>操作</th></tr></thead>
                        <tbody id="modelTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 用户管理 -->
            <div class="layui-tab-item">
                <div class="section-header">
                    <h2>用户管理</h2>
                </div>
                <div class="card">
                    <table class="layui-table data-table" id="userTable" lay-skin="nob">
                        <thead><tr><th>用户名</th><th>角色</th><th>注册时间</th><th>最近登录</th><th>登录IP</th><th>浏览器</th><th>操作</th></tr></thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 数据统计 -->
            <div class="layui-tab-item">
                <div class="section-header">
                    <h2>数据统计</h2>
                </div>
                <!-- 子菜单导航 - 卡片式Tab -->
                <div class="sub-tab-card-group">
                    <div class="sub-tab-card active" onclick="switchDataSubTab('usage', this)">
                        <svg class="sub-tab-card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        <div class="sub-tab-card-text">
                            <span class="sub-tab-card-title">使用记录</span>
                            <span class="sub-tab-card-desc">查看API调用详情</span>
                        </div>
                    </div>
                    <div class="sub-tab-card" onclick="switchDataSubTab('stats', this)">
                        <svg class="sub-tab-card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <div class="sub-tab-card-text">
                            <span class="sub-tab-card-title">用户统计</span>
                            <span class="sub-tab-card-desc">按用户汇总使用量</span>
                        </div>
                    </div>
                </div>

                <!-- 使用记录子页面 -->
                <div id="data-sub-usage" class="data-sub-content active">
                    <div class="card">
                        <div class="stats-search-bar">
                            <div class="search-field">
                                <label class="search-label">用户</label>
                                <select id="usageSearchUser" class="stats-search-select">
                                    <option value="">全部用户</option>
                                </select>
                            </div>
                            <div class="search-field">
                                <label class="search-label">模型</label>
                                <div class="custom-select-area" id="usageModelSelectArea">
                                    <div class="custom-select-trigger" id="usageModelSelectTrigger" onclick="toggleCustomDropdown('usageModelSelectArea')">
                                        <span class="custom-select-value" id="usageModelSelectValue">全部模型</span>
                                        <i class="layui-icon layui-icon-down custom-select-arrow"></i>
                                    </div>
                                    <div class="custom-select-dropdown" id="usageModelSelectDropdown"></div>
                                </div>
                                <input type="hidden" id="usageSearchModel" value="">
                            </div>
                            <div class="search-field">
                                <label class="search-label">日期</label>
                                <input type="date" id="usageSearchDate" class="stats-search-input">
                            </div>
                            <div class="search-actions">
                                <button class="primary-btn" onclick="searchUsage()">
                                    <i class="layui-icon layui-icon-search"></i> 搜索
                                </button>
                                <button class="cancel-btn" onclick="resetUsage()">重置</button>
                            </div>
                        </div>
                        <table class="layui-table data-table" id="usageTable" lay-skin="nob">
                            <thead><tr><th>时间</th><th>用户</th><th>模型</th><th>输入Token</th><th>输出Token</th><th>缓存Token</th><th>思考模式</th></tr></thead>
                            <tbody id="usageTableBody"></tbody>
                        </table>
                        <div id="usagePagination"></div>
                    </div>
                </div>

                <!-- 用户统计子页面 -->
                <div id="data-sub-stats" class="data-sub-content">
                    <div class="card">
                        <div class="stats-search-bar">
                            <div class="search-field">
                                <label class="search-label">用户</label>
                                <select id="statsSearchUser" class="stats-search-select">
                                    <option value="">全部用户</option>
                                </select>
                            </div>
                            <div class="search-field">
                                <label class="search-label">模型</label>
                                <div class="custom-select-area" id="statsModelSelectArea">
                                    <div class="custom-select-trigger" id="statsModelSelectTrigger" onclick="toggleCustomDropdown('statsModelSelectArea')">
                                        <span class="custom-select-value" id="statsModelSelectValue">全部模型</span>
                                        <i class="layui-icon layui-icon-down custom-select-arrow"></i>
                                    </div>
                                    <div class="custom-select-dropdown" id="statsModelSelectDropdown"></div>
                                </div>
                                <input type="hidden" id="statsSearchModel" value="">
                            </div>
                            <div class="search-field">
                                <label class="search-label">日期</label>
                                <input type="date" id="statsSearchDate" class="stats-search-input">
                            </div>
                            <div class="search-actions">
                                <button class="primary-btn" onclick="searchUsageStats()">
                                    <i class="layui-icon layui-icon-search"></i> 搜索
                                </button>
                                <button class="cancel-btn" onclick="resetUsageStats()">重置</button>
                            </div>
                        </div>
                        <table class="layui-table data-table" id="statsTable" lay-skin="nob">
                            <thead><tr><th>用户</th><th>日期</th><th>模型</th><th>调用次数</th><th>输入Token</th><th>输出Token</th><th>缓存Token</th><th>思考模式次数</th></tr></thead>
                            <tbody id="statsTableBody"></tbody>
                        </table>
                        <div id="statsPagination"></div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </main>
</div>

<!-- 自定义下拉框点击外部关闭 -->
<script>
document.addEventListener('click', function(e) {
    var areas = document.querySelectorAll('.custom-select-area');
    areas.forEach(function(area) {
        if (!area.contains(e.target)) {
            var trigger = area.querySelector('.custom-select-trigger');
            var dropdown = area.querySelector('.custom-select-dropdown');
            if (trigger) trigger.classList.remove('active');
            if (dropdown) dropdown.classList.remove('active');
        }
    });
});
</script>
<script src="/layui/layui.js"></script>
<script src="my_js/theme.js"></script>
<script src="my_js/admin.js"></script>
</body>
</html>
